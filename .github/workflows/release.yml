name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
        include:
          - platform: macos-latest
            arch: x64
          - platform: macos-latest
            arch: arm64
          - platform: ubuntu-22.04
            arch: x64
          - platform: windows-latest
            arch: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-action-setup@master

      - name: Install deps (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install deps (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install gtk+3 webkit2gtk-4.1

      - name: Install frontend
        run: npm ci

      - name: Build Tauri
        run: |
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            npm run tauri build -- --target aarch64-apple-darwin
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            npm run tauri build -- --target x86_64-apple-darwin
          else
            npm run tauri build
          fi

      - name: Upload macOS x64
        if: matrix.platform == 'macos-latest' && matrix.arch == 'x64'
        uses: softprops/upload-gh-release-asset@v1
        with:
          filename: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/yt-dlp-fe_*.dmg

      - name: Upload macOS arm64
        if: matrix.platform == 'macos-latest' && matrix.arch == 'arm64'
        uses: softprops/upload-gh-release-asset@v1
        with:
          filename: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/yt-dlp-fe_*.dmg

      - name: Upload Ubuntu deb
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/upload-gh-release-asset@v1
        with:
          filename: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload Windows exe
        if: matrix.platform == 'windows-latest'
        uses: softprops/upload-gh-release-asset@v1
        with:
          filename: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows msi
        if: matrix.platform == 'windows-latest'
        uses: softprops/upload-gh-release-asset@v1
        with:
          filename: src-tauri/target/release/bundle/msi/*.msi
