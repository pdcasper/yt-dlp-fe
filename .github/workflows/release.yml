name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13
            args: --target x86_64-apple-darwin
          - platform: macos-14
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        run: rustup default stable

      - name: Install deps (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install deps (macOS)
        if: matrix.platform == 'macos-13' || matrix.platform == 'macos-14'
        run: brew install gtk+3

      - name: Download yt-dlp
        run: |
          mkdir -p src-tauri/resources
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o src-tauri/resources/yt-dlp
          chmod a+rx src-tauri/resources/yt-dlp

      - name: Download ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          find . -name 'ffmpeg' -type f -exec cp {} src-tauri/resources/ \;

      - name: Download ffmpeg (macOS)
        if: matrix.platform == 'macos-13' || matrix.platform == 'macos-14'
        run: |
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip -o ffmpeg.zip
          unzip -o ffmpeg.zip ffmpeg
          cp ffmpeg src-tauri/resources/

      - name: Download ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          powershell -Command "Expand-Archive -Force ffmpeg.zip .; Copy-Item (Get-ChildItem . -Recurse -Filter 'ffmpeg.exe' | Select-Object -First 1).FullName -Destination src-tauri/resources/ffmpeg.exe -Force"
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o src-tauri/resources/yt-dlp.exe

      - name: Install frontend
        run: npm ci

      - name: Build Tauri
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: src-tauri/target/release/bundle
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist
          recursive: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
