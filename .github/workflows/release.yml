name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13
            args: --target x86_64-apple-darwin
          - platform: macos-14
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        run: rustup default stable

      - name: Install deps (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install deps (macOS)
        if: matrix.platform == 'macos-13' || matrix.platform == 'macos-14'
        run: brew install gtk+3

      - name: Download yt-dlp (macOS/Linux)
        if: matrix.platform != 'windows-latest'
        run: |
          if [ ! -d src-tauri/resources ]; then mkdir -p src-tauri/resources; fi
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o src-tauri/resources/yt-dlp
          chmod +x src-tauri/resources/yt-dlp

      - name: Download yt-dlp (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          if (!(Test-Path src-tauri/resources)) { New-Item -ItemType Directory -Path src-tauri/resources -Force }
          curl -L -o src-tauri/resources/yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
        shell: pwsh

      - name: Download ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          find . -name 'ffmpeg' -type f -exec cp {} src-tauri/resources/ \;

      - name: Download ffmpeg (macOS)
        if: matrix.platform == 'macos-13' || matrix.platform == 'macos-14'
        run: |
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip -o ffmpeg.zip
          unzip -o ffmpeg.zip ffmpeg
          cp ffmpeg src-tauri/resources/

      - name: Download ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          if (!(Test-Path src-tauri/resources)) { New-Item -ItemType Directory -Path src-tauri/resources -Force }
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          powershell -Command "Expand-Archive -Force ffmpeg.zip .; Get-ChildItem . -Recurse -Filter 'ffmpeg.exe' | Select-Object -First 1 | Copy-Item -Destination src-tauri/resources/ffmpeg.exe -Force"
        shell: pwsh

      - name: Install frontend
        run: npm ci

      - name: Build Tauri (macOS)
        if: matrix.platform == 'macos-13' || matrix.platform == 'macos-14'
        run: npm run tauri build -- ${{ matrix.args }} --bundles dmg
        env:
          APPLE_SIGNING_IDENTITY: "-"
          APPLE_IDENTITY: "-"
          CODESIGNING_MODE: skip

      - name: Build Tauri (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: npm run tauri build -- ${{ matrix.args }} --bundles deb

      - name: Build Tauri (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri build -- ${{ matrix.args }} --bundles nsis

      - name: Determine bundle path (macOS/Linux)
        if: matrix.platform != 'windows-latest'
        run: |
          if [ -n "${{ matrix.args }}" ]; then
            target=$(echo "${{ matrix.args }}" | awk '{print $2}')
            echo "BUNDLE_PATH=src-tauri/target/$target/release/bundle" >> $GITHUB_ENV
          else
            echo "BUNDLE_PATH=src-tauri/target/release/bundle" >> $GITHUB_ENV
          fi

      - name: Determine bundle path (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          if ("${{ matrix.args }}") {
            $target = ("${{ matrix.args }}").Trim().Split(' ')[1]
            $path = "src-tauri/target/$target/release/bundle"
          } else {
            $path = "src-tauri/target/release/bundle"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "BUNDLE_PATH=$path"
        shell: pwsh

      - name: List bundle contents (macOS/Linux)
        if: matrix.platform != 'windows-latest'
        run: ls -laR "$BUNDLE_PATH"

      - name: List bundle contents (Windows)
        if: matrix.platform == 'windows-latest'
        run: Get-ChildItem -Path "$env:BUNDLE_PATH" -Recurse | Select-Object FullName
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: ${{ env.BUNDLE_PATH }}

  release:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: ls -laR dist

      - name: Flatten directory structure
        run: |
          find dist -type f -exec mv {} dist/ \;
          rmdir $(find dist -type d -empty)

      - name: List final artifacts
        run: find dist -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}