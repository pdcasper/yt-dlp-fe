<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yt-dlp-fe - YouTube to MP3</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>YouTube to MP3</h1>
      
      <div class="input-group">
        <input 
          type="text" 
          id="url-input" 
          placeholder="Paste YouTube URL here..."
          autocomplete="off"
        />
        <button type="button" id="folder-btn" title="Select download folder">📁</button>
        <button type="button" id="download-btn">Download</button>
        <button type="button" id="cancel-btn" class="hidden" disabled>Cancel</button>
      </div>

      <div id="progress-container" class="hidden">
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <p id="status-text">Preparing...</p>
        <p id="song-title" class="song-title"></p>
      </div>

      <div id="result" class="hidden">
        <p id="result-text"></p>
      </div>
    </main>
  </body>
</html>
