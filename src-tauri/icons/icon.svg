<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ytGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mp3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099CC;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#ytGrad)"/>
  
  <!-- YouTube Play button (stylized) -->
  <polygon points="200,150 200,362 380,256" fill="white"/>
  
  <!-- Musical note -->
  <text x="420" y="120" font-size="100" fill="white">🎵</text>
  
  <!-- Download arrow -->
  <path d="M180,400 L256,480 L332,400" stroke="white" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M200,440 L256,480 L312,440" fill="white"/>
  
  <!-- MP3 text -->
  <text x="256" y="100" font-family="Arial Black, sans-serif" font-size="60" fill="white" text-anchor="middle" font-weight="bold">MP3</text>
</svg>
